<!DOCTYPE html>
<html>
<head>
    <title>Campus Booking System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
            padding: 20px;
        }

        h1 { color: #2c3e50; }
        h3 { color: #34495e; }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        #output {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: left;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

<h1>Campus Booking System</h1>

<!-- ✅ USER -->
<h3>Add User</h3>
<input type="text" id="name" placeholder="Enter Name">

<select id="role">
    <option value="STUDENT">STUDENT</option>
    <option value="FACULTY">FACULTY</option>
</select>

<button onclick="addUser()">Add User</button>

<!-- ✅ RESOURCE -->
<h3>Add Resource</h3>
<input type="text" id="resourceName" placeholder="Enter Resource">

<select id="type">
    <option value="ROOM">ROOM</option>
    <option value="LAB">LAB</option>
    <option value="EQUIPMENT">EQUIPMENT</option>
</select>

<button onclick="addResource()">Add Resource</button>

<!-- ✅ ACTIONS -->
<h3>Actions</h3>
<button onclick="getUsers()">Show Users</button>
<button onclick="getResources()">Show Resources</button>

<!-- ✅ BOOKING -->
<h3>Booking</h3>
<button onclick="createBooking()">Book Resource</button>

<!-- ✅ OUTPUT -->
<h3>Output</h3>
<pre id="output"></pre>

<script>
    function addUser() {
        fetch('/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                role: document.getElementById('role').value
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "User Added:\n" + JSON.stringify(data, null, 2);
            });
    }

    function addResource() {
        fetch('/resources', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('resourceName').value,
                type: document.getElementById('type').value,
                status: "AVAILABLE"
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "Resource Added:\n" + JSON.stringify(data, null, 2);
            });
    }

    function getUsers() {
        fetch('/users')
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    JSON.stringify(data, null, 2);
            });
    }

    function getResources() {
        fetch('/resources')
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    JSON.stringify(data, null, 2);
            });
    }

    function createBooking() {
        fetch('/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user: { id: 1 },
                resource: { id: 1 }
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "Booking Created:\n" + JSON.stringify(data, null, 2);
            });
    }
</script>

</body>
</html>
