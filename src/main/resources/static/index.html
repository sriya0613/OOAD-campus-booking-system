<!DOCTYPE html>
<html>
<head>
    <title>Campus Booking System</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }
        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 { color: #2c3e50; }
        h3 { color: #34495e; }

        input, select {
            padding: 10px;
            margin: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 180px;
        }

        button {
            padding: 10px 18px;
            margin: 6px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        .section { margin-top: 15px; }

        #output {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Campus Booking System</h1>


    <div class="section">
        <h3>Login</h3>
        <input type="text" id="loginName" placeholder="Name">
        <input type="text" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>


    <div class="section">
        <h3>Add User</h3>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="password" placeholder="Password">
        <select id="role">
            <option value="STUDENT">STUDENT</option>
            <option value="FACULTY">FACULTY</option>
        </select>
        <button onclick="addUser()">Add User</button>
    </div>


    <div class="section">
        <h3>Book Resource</h3>
        <select id="resourceSelect"></select>
        <button onclick="createBooking()">Book</button>
    </div>


    <div class="section">
        <h3>Cancel My Booking</h3>
        <input type="number" id="cancelId" placeholder="Booking ID">
        <button onclick="cancelBooking()">Cancel</button>
    </div>


    <div class="section">
        <h3>My Bookings</h3>
        <button onclick="viewMyBookings()">View My Bookings</button>
    </div>

    <pre id="output"></pre>

</div>

<script>

    let loggedInUserId = null;

    // LOGIN
    function login() {
        fetch('/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('loginName').value,
                password: document.getElementById('loginPassword').value
            })
        })
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(user => {
                loggedInUserId = user.id;
                alert("Login successful: " + user.name);
            })
            .catch(() => alert("Login failed ❌"));
    }

    // ADD USER
    function addUser() {
        fetch('/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('name').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "User Added:\n" + JSON.stringify(data, null, 2);
            });
    }

    // LOAD RESOURCES
    function loadResources() {
        fetch('/resources')
            .then(res => res.json())
            .then(data => {
                const dropdown = document.getElementById('resourceSelect');
                dropdown.innerHTML = '';

                data.forEach(r => {
                    const option = document.createElement('option');
                    option.value = r.id;
                    option.text = r.name;
                    dropdown.appendChild(option);
                });
            });
    }

    // CREATE BOOKING
    function createBooking() {
        if (!loggedInUserId) {
            alert("Login first");
            return;
        }

        const resourceId = document.getElementById('resourceSelect').value;

        fetch('/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user: { id: loggedInUserId },
                resource: { id: resourceId }
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "Booking Created:\n" + JSON.stringify(data, null, 2);
            });
    }

    // CANCEL BOOKING
    function cancelBooking() {
        if (!loggedInUserId) {
            alert("Login first");
            return;
        }

        const bookingId = document.getElementById('cancelId').value;

        fetch(`/bookings/cancel/${bookingId}`, {
            method: 'PUT'
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "Booking Cancelled:\n" + JSON.stringify(data, null, 2);
            })
            .catch(() => alert("Cancel failed"));
    }


    function viewMyBookings() {
        if (!loggedInUserId) {
            alert("Login first");
            return;
        }

        fetch(`/bookings/user/${loggedInUserId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('output').innerText =
                    "My Bookings:\n" + JSON.stringify(data, null, 2);
            });
    }

    window.onload = loadResources;

</script>

</body>
</html>
